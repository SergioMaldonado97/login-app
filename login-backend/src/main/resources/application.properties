server.port=8080

# SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=logindb;encrypt=false
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${DB_USERNAME:SA}
spring.datasource.password=${DB_PASSWORD:Admin1234!}
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET:c2VyZ2lvbWFsZG9uYWRvbG9naW5hcHBzZWNyZXRrZXkyMDI2}
jwt.expiration=86400000

# PRODUCCION: definir DB_PASSWORD, DB_USERNAME y JWT_SECRET como variables de entorno
