<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="header-icon">👥</span>
      <h1>Gestión de Usuarios</h1>
    </div>
    <div class="header-right">
      <button class="btn btn-primary" (click)="abrirCrear()">+ Nuevo usuario</button>
      <button class="btn btn-logout" (click)="cerrarSesion()">Cerrar sesión</button>
    </div>
  </header>

  <!-- Error global -->
  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <!-- Tabla -->
  <div class="table-wrapper">
    <div *ngIf="loading" class="spinner-wrap">
      <div class="spinner"></div>
    </div>

    <table *ngIf="!loading">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Usuario</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of usuarios">
          <td class="td-id">{{ u.id }}</td>
          <td>{{ u.nombre }}</td>
          <td><span class="badge">{{ u.username }}</span></td>
          <td><span class="badge-rol" [class.admin]="u.rol === 'ADMIN'" [class.regular]="u.rol === 'REGULAR'">{{ u.rol }}</span></td>
          <td class="td-actions">
            <button class="btn btn-edit" (click)="abrirEditar(u)">Editar</button>
            <button class="btn btn-danger" (click)="pedirConfirmacion(u.id)">Eliminar</button>
          </td>
        </tr>
        <tr *ngIf="usuarios.length === 0">
          <td colspan="5" class="empty">No hay usuarios registrados.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal crear/editar -->
  <div class="modal-overlay" *ngIf="showModal" (click)="cerrarModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ editMode ? 'Editar usuario' : 'Nuevo usuario' }}</h2>
        <button class="close-btn" (click)="cerrarModal()">✕</button>
      </div>

      <form (ngSubmit)="guardar()" class="modal-form">
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" [(ngModel)]="form.nombre" name="nombre" placeholder="Ej: Juan Pérez" required />
        </div>
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" [(ngModel)]="form.username" name="username" placeholder="Ej: jperez"
            [disabled]="editMode" required />
        </div>
        <div class="form-group">
          <label>Contraseña {{ editMode ? '(dejar vacío para no cambiar)' : '' }}</label>
          <input type="password" [(ngModel)]="form.password" name="password"
            [placeholder]="editMode ? 'Nueva contraseña (opcional)' : 'Contraseña'"
            [required]="!editMode" />
        </div>
        <div class="form-group">
          <label>Rol</label>
          <select [(ngModel)]="form.rol" name="rol">
            <option value="REGULAR">Regular</option>
            <option value="ADMIN">Admin</option>
          </select>
        </div>

        <div *ngIf="formError" class="alert alert-error">{{ formError }}</div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary" [disabled]="formLoading">
            {{ formLoading ? 'Guardando...' : (editMode ? 'Actualizar' : 'Crear') }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal confirmación eliminar -->
  <div class="modal-overlay" *ngIf="confirmDelete !== null" (click)="cancelarEliminar()">
    <div class="modal modal-confirm" (click)="$event.stopPropagation()">
      <div class="confirm-icon">⚠️</div>
      <h2>¿Eliminar usuario?</h2>
      <p>Esta acción no se puede deshacer.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" (click)="cancelarEliminar()">Cancelar</button>
        <button class="btn btn-danger" (click)="eliminar(confirmDelete!)">Sí, eliminar</button>
      </div>
    </div>
  </div>

</div>
